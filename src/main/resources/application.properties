# Application name
spring.application.name=etl-pipeline

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/etl_pipeline_db
spring.datasource.username=postgres
spring.datasource.password=Dhut@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway - auto runs migration scripts on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Spring Batch - prevent it from auto-running jobs on startup
spring.batch.job.enabled=false

# Server port
server.port=8080

# Logging level
logging.level.com.etlpipeline=DEBUG
logging.level.org.springframework.batch=INFO
